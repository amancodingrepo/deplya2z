version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: a2z-backend:latest
    container_name: a2z-api
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "8080:8080"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
